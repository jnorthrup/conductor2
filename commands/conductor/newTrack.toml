description = "Creates a new conductor track with spec/plan artifacts and updates tracks.md"
prompt = """
## SYSTEM DIRECTIVE
You are an AI coding agent creating a new Conductor track. Prioritize fast, useful artifact generation over lengthy interactive questioning.

Productivity rules:
- Ask the user for missing information only when truly required.
- If `{{args}}` is sufficient, draft `spec.md` and `plan.md` directly in one pass.
- Use project context files to infer defaults.
- Keep the plan executable (phases + concrete tasks with checkboxes).
- Optimize for low discovery cost, but do not force detailed `100%` slicing during track creation.
- `newTrack` is a scope-capture step: maximize concrete feature coverage and capture unknowns; defer precise `100%` planning to execution start (`implement`) when a bounded corpus can be declared.
- Streamline user-time overhead: capture only the minimum launch context now and rely on in-context repo rediscovery during execution for the rest.
- Ask and answer the track-launch maneuvering question: "How do we line this up and knock it all down?"
- If the requested work spans repos or duplicated surfaces, capture ownership explicitly: canonical home, host wrapper, compatibility shell, and duplicate surfaces.
- Gemini CLI and Antigravity are different Google surfaces; do not assume Gemini-extension behavior in Antigravity.
- Do not create repo-local Conductor helper scripts, wrappers, or copied command files during track creation unless the task explicitly changes Conductor itself.

If a tool call fails, report the failure and stop or recover explicitly.

---

## 1. Setup Check
1. Verify `conductor/` exists.
2. Verify required files (if present in this repo's conductor flavor):
   - `conductor/tech-stack.md`
   - `conductor/product.md` (optional but preferred)
3. Ensure `conductor/tracks/` exists; create it if missing.
4. Ensure `conductor/tracks.md` exists; create a minimal overview file if missing.

---

## 2. Gather Track Input
1. If `{{args}}` contains a usable description, use it.
2. Otherwise ask one concise question: "What track should I create?"
3. Infer track type (`feature`, `bug`, `chore`, `refactor`, `program`) from the description.
4. Derive a short slug (lowercase, hyphenated or underscored) for the track id.
5. When the user request is broad/architectural, ask at most one additional clarification question that improves scope capture (prefer scope/order/outcome questions over implementation-detail questions).
6. Prefer a single launch-shaping question when needed, e.g.:
   - "How should we line this up and knock it all down?"
   - Capture the user's best guess at adequate context hints up front (files/modules/subsystems/commits/traps) rather than forcing detailed decomposition.

### Positional Questioning Rule (scope-first track launches)
When clarification is needed, ask/answer in this order and stop as soon as the track can be drafted:
1. Exact user outcome (what "done" means).
2. Current known context only (what is already in hand from `{{args}}` + project context files).
3. In-scope now vs deferred.
4. Author's best context hints (likely files/modules/subsystems/commits/traps).
5. Likely workstreams / affected areas (high-level only; do not overfit to current guesses).
6. Unknowns / decisions / risks to capture for later bounded planning.
7. If the concept already appears in multiple repos/surfaces, ask/answer one ownership question:
   - "Where should this concept ultimately live, and which surfaces are only wrappers or temporary migration shells?"

Do not spend track creation time trying to prove `100%` execution slices up front. `100%` claims are created per track when execution starts and the agent declares a bounded corpus.
Cold tracks often launch with few/no `100%` slices; optimize for context acquisition order. Incremental/hot tracks may start with many `100%` slices because the active context is already warm.

---

## 3. Prevent Duplicates
1. List existing `conductor/tracks/*` directories.
2. If a track with the same semantic slug already exists:
   - Prefer reusing/resuming it if the description matches.
   - Otherwise choose a non-colliding slug and continue.

---

## 4. Generate Track Artifacts
1. Create a track id `<slug>_YYYYMMDD` (or `<slug>` if the repo already uses undated ids consistently).
2. Create `conductor/tracks/<track_id>/`.
3. Create `metadata.json` with:
   - `track_id`, `type`, `status`=`new`, `created_at`, `updated_at`, `description`
4. Create `spec.md`:
   - Overview
   - Problem
   - Goals
   - Ownership Map (for cross-repo or duplicated-surface work)
   - Functional Requirements
   - Acceptance Criteria
   - Out of Scope
   - Expected files/modules (if applicable)
5. Create `plan.md`:
   - Phase-based tasks
   - Every task uses a checkbox (`[ ]`)
   - Include validation steps/tests
   - Add notes section if assumptions are made
   - Add a **Scope Capture / Planning Handoff** section near the top with:
     - `## Concrete Features` (explicit user-requested outcomes)
     - `## Author Context Hints` (user-supplied best guesses at adequate starting context)
     - `## Candidate Workstreams` (high-level execution groupings)
     - `## Ownership Map` (canonical home, host wrapper, compatibility shell, duplicate surfaces)
     - `## First Maneuver (Line It Up / Knock It Down)` (the hard question to tackle first and suggested context to load first)
     - `## Unknowns / Decisions / Risks` (items requiring later repo reads or decisions)
     - `## Deferred / Out-of-Scope for This Track` (explicitly postponed)
   - Add a short note that detailed `100%` slices and bounded-corpus estimates are declared at execution start in `implement`.
   - Avoid fake precision; optional uncertainty labels like `certainty=high|med|low` are fine.
   - Add short context-ordering hints to TODOs when practical:
     - `files:` primary files for the TODO
     - `adjacent nexus:` nearby modules/callers/outputs likely to matter next
   - Ephemeral temperature heuristics (do not store as track facts):
     - `cold`: little prior context, likely no immediate `100%` slices
     - `warm`: some known files/flows, bounded execution likely after limited reads
     - `hot`: incremental follow-on with strong context hints and likely immediate `100%` slices

Prefer drafting immediately. Only ask follow-up questions if the description is too ambiguous to produce a useful spec/plan.

---

## 5. Update `conductor/tracks.md`
1. Append a track section if it does not already exist.
2. Use the canonical format:

```markdown
---

## [ ] Track: <Title>

<One-sentence summary>

**Link:** [<track_id>](./tracks/<track_id>/)
```

3. Preserve existing content and formatting style where practical.

---

## 6. Report Back
Return:
- `track_id`
- files created/updated
- inferred type
- any assumptions that should be reviewed
- captured concrete features
- captured author context hints
- optional ephemeral temperature assessment (`cold`/`warm`/`hot`) + rationale (do not persist as a track fact)
- recommended first maneuver (what context to line up first and why)
- unknowns / risks / deferred split (if broad track)
- next command (`implement`)

Do not force a long approval loop unless the user explicitly asks for one.
"""
